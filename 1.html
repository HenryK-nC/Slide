<!DOCTYPE html>
<html lang="ko" data-theme="light" style=""><head>
<meta charset="utf-8">
<meta content="width=1280, height=720, initial-scale=1.0" name="viewport">
<title>Ethereum Korea 2026 - Title Slide</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=Inter:wght@300;400;600;800&amp;display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
        body {
            margin: 0;
            padding: 0;
            width: 1280px;
            height: 720px;
            overflow: hidden;
            background-color: #0F172A;
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }
        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        /* Background Layer */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: url("daemoon.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: 80% center; /* shift focal point to the right where there is less text */
        }
        /* Solid Overlay for readability over background photo */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.85); /* Deep slate/blue dark */
            z-index: 1;
        }
        /* Geometric Pattern Overlay - using SVG data URI to avoid CSS gradients */
        .pattern-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: 2;
        }
        
        /* Content Layer */
        .content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 80px;
        }

        /* Typography & Decor */
        .glass-tag {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
        }
        
        .title-accent {
            color: #A78BFA; /* Soft Purple/Blue for Ethereum vibe */
        }
        
        .glow-line {
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.5);
        }
    </style>
</head>
<body style="">
<div class="slide-container">
<!-- Background -->
<div class="bg-layer"></div>
<!-- Overlays -->
<div class="overlay"></div>
<div class="pattern-overlay"></div>
<!-- Main Content -->
<div class="content">
<!-- Header: Date & Location -->
<div class="flex justify-between items-start border-b border-gray-700 pb-6">
<div class="flex items-center space-x-3">
<span class="px-3 py-1 bg-blue-900 bg-opacity-40 border border-blue-500/30 rounded text-blue-300 text-xs font-bold tracking-widest uppercase">
                        Invitation Only
                    </span>
<span class="text-gray-400 text-sm tracking-wide">April 16, 2026</span>
</div>
<div class="text-right">
<p class="text-white font-medium text-lg flex items-center justify-end">
<i class="fas fa-map-marker-alt text-blue-400 mr-2"></i> Seoul, Gangnam
                    </p>
</div>
</div>
<!-- Center: Title Block -->
<div class="flex flex-col justify-center flex-grow">
<p class="text-gray-400 tracking-[0.3em] uppercase text-sm font-semibold mb-4 pl-1">
                    The Sovereign Collective
                </p>
<h1 class="text-7xl font-black text-white leading-none mb-6 tracking-tight">
                    ETHEREUM <br>
<span class="title-accent">KOREA 2026</span>
</h1>
<!-- Decorative Bar -->
<div class="w-32 h-2 bg-gradient-to-r from-blue-500 to-purple-600 mb-8 rounded-full" style="background-color: #6366f1;"></div> <!-- Fallback solid color styling handled by class but explicit inline for safety against gradient restriction if strictly interpreted, using solid blue-purple hex -->
<div class="w-32 h-2 bg-indigo-500 mb-8 rounded-full glow-line"></div>
<p class="text-2xl text-gray-300 font-light max-w-4xl leading-relaxed">Scaling the <strong class="text-white font-bold">Korean Ethereum Landscape:<br></strong>Where Global Foundations Meet the Next Frontier of Institutional Adoption</p>
</div>
                <!-- Footer: Co-hosts -->
                <div class="flex items-end justify-end">
                  <!-- Co-Hosts -->
                  <div class="flex flex-col space-y-3 items-end text-right">
                    <p class="text-xs text-gray-500 uppercase tracking-widest font-semibold">Co-Hosted By</p>
                    <div class="flex items-center space-x-8">
                      <!-- Ethereum Foundation: colored symbol from base logo + white text overlay -->
                      <div class="relative h-12 flex items-center">
                        <img src="logo_ef_1.png" alt="Ethereum Foundation Logo base"
                             class="h-12 w-auto object-contain">
                        <img src="logo_ef_white.png" alt="Ethereum Foundation Logo white text"
                             class="h-12 w-auto object-contain absolute top-0 left-0"
                             style="clip-path: inset(0 0 0 20%);">
                      </div>
                      <img src="logo_TiETH.svg" alt="Ticker is ETH Logo" class="h-12 w-auto object-contain">
                      <img src="logo_nonceclassic.png" alt="Nonce Classic Logo" class="h-10 w-auto object-contain">
                    </div>
                  </div>
                </div>
</div>
</div>

</body></html>
