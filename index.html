<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethereum Korea 2026 - Slides</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    #wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0F172A;
    }
    #slide-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      cursor: pointer;
    }
    #page-indicator {
      position: absolute;
      bottom: 16px;
      right: 24px;
      z-index: 20;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      font-family: sans-serif;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <iframe id="slide-frame" src="1.html" title="Slide"></iframe>
    <div id="overlay" title="클릭 또는 → / Space: 다음, ←: 이전"></div>
    <div id="page-indicator">1 / 7</div>
  </div>
  <script>
    const frame = document.getElementById('slide-frame');
    const overlay = document.getElementById('overlay');
    const indicator = document.getElementById('page-indicator');
    let current = 1;
    const total = 7;

    function go(n) {
      current = n;
      if (current < 1) current = total;
      if (current > total) current = 1;
      frame.src = current + '.html';
      indicator.textContent = current + ' / ' + total;
    }

    overlay.addEventListener('click', () => go(current + 1));

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        go(current + 1);
      }
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        go(current - 1);
      }
    });
  </script>
</body>
</html>
